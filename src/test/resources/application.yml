spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

booking:
  # 배경 sweep/reconcile 정지 → 통합 테스트가 sweep()/reconcile() 을 수동 트리거해 결정성 확보(T3-11).
  # 토글 off 라도 @ConditionalOnProperty 가 스케줄러 빈을 제외할 뿐, 아래 값들은 Properties 바인딩용으로 유지.
  scheduler:
    enabled: false
  admission:
    max-active: 100
    token-ttl: 10m
    retry-after: 5s
  expiry:
    batch-size: 100
    sweep-interval: 1h    # 토글 off 라 미발화. 플레이스홀더 해석·Properties 바인딩 안전용.
  reconcile:
    interval: 1h          # 토글 off 라 미발화. 플레이스홀더 해석용.
    preempt-grace: 5m     # 수동 reconcile 호출이 grace 비교(in-flight 판정)에 사용.
